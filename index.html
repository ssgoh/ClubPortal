<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pi Python Makers Club</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --bg: #0f172a; --accent: #38bdf8; --card: #1e293b; }
        body { background: var(--bg); color: #f8fafc; font-family: system-ui, sans-serif; margin: 0; overflow-y: scroll; }
        .admin-only { display: none; }
        body.admin-mode .admin-only { display: block; }
        .card:hover { border-color: var(--accent); transform: translateY(-4px); }
        .card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); height: 100%; display: flex; flex-direction: column; }
    </style>
</head>
<body id="main-body">

    <!-- Navigation -->
    <nav class="border-b border-white/5 bg-slate-950/80 backdrop-blur-md sticky top-0 z-50 p-4">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-sky-500 rounded-xl flex items-center justify-center font-bold text-xl shadow-lg shadow-sky-500/20 text-white">π</div>
                <h1 class="text-xl font-bold tracking-tight bg-gradient-to-r from-sky-400 to-indigo-400 bg-clip-text text-transparent">
                    Pi Python Makers
                </h1>
            </div>
            <div class="flex gap-2">
                <button onclick="saveCodeToClipboard()" class="admin-only bg-emerald-600 hover:bg-emerald-500 text-white px-4 py-2 rounded-full text-xs font-bold transition-all shadow-lg shadow-emerald-600/20">
                    COPY UPDATED CODE
                </button>
                <button onclick="document.getElementById('main-body').classList.toggle('admin-mode')" class="bg-slate-800 hover:bg-slate-700 text-white px-4 py-2 rounded-full text-xs font-bold transition-all flex items-center gap-2">
                    ⚙️ ADMIN
                </button>
            </div>
        </div>
    </nav>

    <!-- Header -->
    <header class="max-w-4xl mx-auto text-center pt-16 pb-12 px-6">
        <h2 class="text-5xl md:text-6xl font-black mb-6 leading-tight">
            Build. Code. <span class="text-sky-400">Create.</span>
        </h2>
        <p class="text-slate-400 text-lg">Your local portal for Python innovation.</p>
    </header>

    <!-- Search & Filters -->
    <div class="max-w-md mx-auto px-6 mb-8">
        <input type="text" id="search-input" oninput="renderItems()" placeholder="Search my creations..." class="w-full bg-black border border-slate-800 rounded-xl p-3 text-white outline-none focus:ring-2 ring-sky-500 transition-all">
    </div>

    <div class="flex justify-center mb-12 px-6">
        <div class="inline-flex p-1.5 bg-slate-900/50 rounded-2xl border border-white/5 backdrop-blur-sm">
            <button onclick="setFilter('all')" id="tab-all" class="tab-btn px-6 py-2.5 rounded-xl text-sm font-bold transition-all bg-sky-500 text-white">All</button>
            <button onclick="setFilter('project')" id="tab-project" class="tab-btn px-6 py-2.5 rounded-xl text-sm font-bold transition-all text-slate-400 hover:text-white">Projects</button>
            <button onclick="setFilter('tutorial')" id="tab-tutorial" class="tab-btn px-6 py-2.5 rounded-xl text-sm font-bold transition-all text-slate-400 hover:text-white">Tutorials</button>
        </div>
    </div>

    <!-- Admin Panel -->
    <section class="admin-only max-w-4xl mx-auto px-6 mb-12 animate-in fade-in zoom-in duration-300">
        <div class="bg-slate-900 border border-sky-500/30 rounded-3xl p-8 shadow-2xl">
            <h3 class="text-xl font-bold mb-6 text-sky-400 flex items-center gap-2">📂 Folder & Path Builder</h3>
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="space-y-4">
                    <div>
                        <label class="text-[10px] font-bold text-slate-500 uppercase ml-1">Creation Title</label>
                        <input type="text" id="add-title" class="w-full bg-slate-950 border border-white/10 rounded-xl p-3 focus:ring-2 ring-sky-500 outline-none">
                    </div>
                    <div>
                        <label class="text-[10px] font-bold text-slate-500 uppercase ml-1">Type</label>
                        <select id="add-category" onchange="updateBuilder()" class="w-full bg-slate-950 border border-white/10 rounded-xl p-3 outline-none">
                            <option value="Project">Project (Folder: projects/)</option>
                            <option value="Tutorial">Tutorial (Folder: tutorials/)</option>
                        </select>
                    </div>
                </div>

                <div class="space-y-4">
                    <div class="bg-slate-950 border border-white/5 rounded-2xl p-4">
                        <label class="text-[10px] font-bold text-slate-500 uppercase block mb-2">Target Filename</label>
                        <div class="flex items-center gap-2 bg-black/40 p-2 rounded-lg border border-white/10">
                            <span id="folder-prefix" class="text-sky-500/60 font-mono text-xs font-bold">projects/</span>
                            <input type="text" id="add-filename" oninput="updateBuilder()" placeholder="my_code.html" class="bg-transparent outline-none font-mono text-xs text-sky-400 flex-grow">
                        </div>
                        <p id="preview-text" class="mt-2 text-[9px] font-mono text-slate-500 italic">Expected location: \ClubFolder\projects\my_code.html</p>
                    </div>
                    <div>
                        <label class="text-[10px] font-bold text-slate-500 uppercase ml-1">Brief Description</label>
                        <textarea id="add-desc" class="w-full bg-slate-950 border border-white/10 rounded-xl p-3 h-[42px] outline-none resize-none text-sm"></textarea>
                    </div>
                </div>
            </div>
            
            <button onclick="createNewItem()" class="w-full mt-6 bg-sky-500 hover:bg-sky-400 text-slate-950 font-black py-4 rounded-2xl transition-all">
                ADD TO LOCAL PORTAL
            </button>
        </div>
    </section>

    <!-- Content Grid -->
    <main id="content-grid" class="max-w-6xl mx-auto px-6 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 mb-24"></main>

    <footer class="py-12 border-t border-white/5 text-center text-slate-600">
        <p class="text-[10px] font-bold tracking-[0.3em]">PI PYTHON MAKERS CLUB &bull; LOCAL FILESYSTEM</p>
    </footer>

    <script id="data-script">
        // == LOCAL DATABASE ==
        var items = [
            { id: 1, title: "Weather Station", category: "Project", link: "projects/weather.html", desc: "Monitors local temperature and humidity via Python." },
            { id: 2, title: "Python Basics", category: "Tutorial", link: "tutorials/basics.html", desc: "Essential concepts for beginners." }
        ];
        // == END DATABASE ==

        let filterMode = 'all';

        function updateBuilder() {
            const cat = document.getElementById('add-category').value.toLowerCase();
            const filename = document.getElementById('add-filename').value || 'file.html';
            const prefix = cat === 'project' ? 'projects/' : 'tutorials/';
            
            document.getElementById('folder-prefix').innerText = prefix;
            document.getElementById('preview-text').innerText = `Expected location: \\ClubFolder\\${prefix}${filename}`.replace(/\//g, '\\');
        }

        function renderItems() {
            const container = document.getElementById('content-grid');
            const query = document.getElementById('search-input').value.toLowerCase();

            const displayList = items.filter(item => {
                const isCat = filterMode === 'all' || item.category.toLowerCase() === filterMode;
                const isMatch = item.title.toLowerCase().includes(query);
                return isCat && isMatch;
            });

            container.innerHTML = displayList.map(item => `
                <div class="card bg-slate-900/40 border border-white/5 rounded-3xl p-6 group">
                    <div class="flex justify-between items-start mb-6">
                        <div class="w-12 h-12 bg-sky-500/10 rounded-2xl flex items-center justify-center text-2xl group-hover:bg-sky-500 transition-all duration-300">
                            ${item.category === 'Project' ? '🚀' : '📖'}
                        </div>
                        <span class="text-[9px] font-black bg-white/5 px-3 py-1 rounded-full text-slate-500 border border-white/5">
                            ${item.category.toUpperCase()}
                        </span>
                    </div>
                    <h3 class="text-xl font-bold mb-2 group-hover:text-sky-400 transition-colors">${item.title}</h3>
                    <p class="text-slate-400 text-sm leading-relaxed mb-8 line-clamp-2">${item.desc}</p>
                    <div class="flex gap-2 mt-auto">
                        <a href="${item.link}" target="_blank" class="flex-grow bg-white/5 hover:bg-sky-500 hover:text-white border border-white/10 text-center py-3 rounded-2xl text-xs font-bold transition-all">
                            OPEN FILE
                        </a>
                        <button onclick="deleteItem(${item.id})" class="admin-only bg-red-500/10 text-red-500 hover:bg-red-500 hover:text-white p-3 rounded-2xl transition-all">
                            🗑️
                        </button>
                    </div>
                </div>
            `).join('');
        }

        function setFilter(f) {
            filterMode = f;
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('bg-sky-500', 'text-white');
                btn.classList.add('text-slate-400');
            });
            document.getElementById('tab-' + f).classList.add('bg-sky-500', 'text-white');
            document.getElementById('tab-' + f).classList.remove('text-slate-400');
            renderItems();
        }

        function createNewItem() {
            const title = document.getElementById('add-title').value;
            const cat = document.getElementById('add-category').value;
            const file = document.getElementById('add-filename').value;
            const desc = document.getElementById('add-desc').value;

            if(!title || !file) return alert("Please fill in Title and Filename.");

            const prefix = cat.toLowerCase() === 'project' ? 'projects/' : 'tutorials/';
            items.push({
                id: Date.now(),
                title: title,
                category: cat,
                link: prefix + file,
                desc: desc || "No description provided."
            });

            renderItems();
            document.getElementById('add-title').value = '';
            document.getElementById('add-filename').value = '';
            document.getElementById('add-desc').value = '';
        }

        function deleteItem(id) {
            if(confirm("Permanently remove this entry from your list?")) {
                items = items.filter(i => i.id !== id);
                renderItems();
            }
        }

        async function saveCodeToClipboard() {
            const dataString = `var items = ${JSON.stringify(items, null, 12)};`;
            const currentDoc = document.documentElement.outerHTML;
            const updatedDoc = '<!DOCTYPE html>\n' + currentDoc.replace(/var items = \[[\s\S]*?\];/, dataString);
            
            try {
                await navigator.clipboard.writeText(updatedDoc);
                alert("SUCCESS!\n\nYour entire updated index.html code is copied.\n1. Open your index.html in a text editor.\n2. Select All (Ctrl+A).\n3. Paste (Ctrl+V).\n4. Save!");
            } catch (e) {
                alert("Failed to copy. Try manual edit in the script tag.");
            }
        }

        window.onload = renderItems;
    </script>
</body>
</html>
