<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pico W IoT Academy</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;
        
        // --- INLINE SVG ICONS (Replaces Lucide to fix Error #130) ---
        const Icon = ({ name, size = 24, className = "" }) => {
            const icons = {
                Cpu: (
                    <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                        <rect x="4" y="4" width="16" height="16" rx="2" ry="2"/><rect x="9" y="9" width="6" height="6"/><line x1="9" y1="1" x2="9" y2="4"/><line x1="15" y1="1" x2="15" y2="4"/><line x1="9" y1="20" x2="9" y2="23"/><line x1="15" y1="20" x2="15" y2="23"/><line x1="20" y1="9" x2="23" y2="9"/><line x1="20" y1="15" x2="23" y2="15"/><line x1="1" y1="9" x2="4" y2="9"/><line x1="1" y1="15" x2="4" y2="15"/>
                    </svg>
                ),
                BookOpen: (
                    <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                        <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>
                    </svg>
                ),
                Wifi: (
                    <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                        <path d="M5 12.55a11 11 0 0 1 14.08 0"/><path d="M1.42 9a16 16 0 0 1 21.16 0"/><path d="M8.53 16.11a6 6 0 0 1 6.95 0"/><line x1="12" y1="20" x2="12.01" y2="20"/>
                    </svg>
                ),
                Zap: (
                    <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                        <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>
                    </svg>
                ),
                Layout: (
                    <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                        <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="21" x2="9" y2="9"/>
                    </svg>
                ),
                Code: (
                    <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                        <polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/>
                    </svg>
                ),
                AlertCircle: (
                    <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                        <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
                    </svg>
                ),
                Rocket: (
                    <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                        <path d="M4.5 16.5c-1.5 1.26-2 5-2 5s3.74-.5 5-2c.71-.84.7-2.13-.09-2.91a2.18 2.18 0 0 0-2.91-.09z"/><path d="m12 15-3-3a22 22 0 0 1 2-3.95A12.88 12.88 0 0 1 22 2c0 2.72-.78 7.5-6 11a22.35 22.35 0 0 1-4 2z"/><path d="M9 12H4s.55-3.03 2-4c1.62-1.08 5 0 5 0"/><path d="M12 15v5s3.03-.55 4-2c1.08-1.62 0-5 0-5"/>
                    </svg>
                ),
                Home: (
                    <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                        <path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/>
                    </svg>
                )
            };
            return icons[name] || null;
        };

        // --- DATA ---
        const LESSONS = [
            {
                id: 'wifi-101',
                module: 'Basics',
                title: 'Connecting to WiFi',
                level: 'Beginner',
                duration: '15 mins',
                objective: 'Connect your Pico W to your home network.',
                content: 'The Raspberry Pi Pico W uses the "network" module to talk to your router. This is the first step for any IoT project.',
                wiring: 'No external components needed! Just plug your Pico W into your computer via USB.',
                diagramUrl: 'https://images.unsplash.com/photo-1555664424-778a1e5e1b48?auto=format&fit=crop&q=80&w=1000',
                code: `import network\nimport time\n\nwlan = network.WLAN(network.STA_IF)\nwlan.active(True)\nwlan.connect('YOUR_SSID', 'YOUR_PASSWORD')\n\nwhile not wlan.isconnected():\n    print("Waiting for connection...")\n    time.sleep(1)\n    \nprint("Connected!", wlan.ifconfig())`,
                troubleshooting: 'Ensure your WiFi is 2.4GHz. Most microcontrollers cannot see 5GHz networks.'
            },
            {
                id: 'light-sensor',
                module: 'Basics',
                title: 'Light Sensors (LDR)',
                level: 'Beginner',
                duration: '10 mins',
                objective: 'Measure ambient light levels using an LDR.',
                content: 'An LDR (Light Dependent Resistor) changes its resistance based on how much light hits it. We use the Analog-to-Digital Converter (ADC) to read this value.',
                wiring: `HARDWARE: LDR, 10kΩ Resistor.\n\n1. Connect one leg of the LDR to 3.3V (Pin 36).\n2. Connect the other leg of the LDR to GP26 (Pin 31).\n3. Connect a 10kΩ resistor from GP26 to GND (Pin 38).`,
                diagramUrl: 'https://images.unsplash.com/photo-1518770660439-4636190af475?auto=format&fit=crop&q=80&w=1000',
                code: `import machine\nimport time\n\nldr = machine.ADC(26)\n\nwhile True:\n    value = ldr.read_u16()\n    print("Light Level:", value)\n    time.sleep(0.5)`,
                troubleshooting: 'If the value stays at 65535, check if your 3.3V wire is loose.'
            },
            {
                id: 'mqtt-led',
                module: 'IoT Cloud',
                title: 'MQTT Remote Control',
                level: 'Intermediate',
                duration: '30 mins',
                objective: 'Control an LED from anywhere using MQTT.',
                content: 'MQTT is a lightweight messaging protocol used for machine-to-machine communication.',
                wiring: `1. Connect LED Anode to GP15.\n2. Connect LED Cathode to a 220Ω Resistor.\n3. Connect Resistor to GND.`,
                code: `from umqtt.simple import MQTTClient\n# Add your MQTT broker details\nclient = MQTTClient("pico", "broker.hivemq.com")\nclient.connect()`,
                troubleshooting: 'Check your broker address and firewall settings.'
            }
        ];

        const PROJECTS = [
            {
                id: 'p-1',
                title: 'Smart Plant Monitor',
                desc: 'Measure soil moisture and send alerts to your phone.',
                difficulty: 'Intermediate',
                parts: ['Soil Sensor', 'Buzzer', 'Pico W']
            },
            {
                id: 'p-2',
                title: 'OLED Weather Station',
                desc: 'Pull local weather data from an API and display it.',
                difficulty: 'Advanced',
                parts: ['SSD1306 OLED', 'I2C Cables', 'Pico W']
            }
        ];

        // --- COMPONENTS ---
        function App() {
            const [view, setView] = useState('dashboard'); 
            const [selectedLesson, setSelectedLesson] = useState(null);
            const [isImgZoomed, setIsImgZoomed] = useState(false);

            const handleCopy = (text) => {
                const el = document.createElement('textarea');
                el.value = text;
                document.body.appendChild(el);
                el.select();
                document.execCommand('copy');
                document.body.removeChild(el);
            };

            return (
                <div className="min-h-screen pb-20 md:pb-0 text-slate-900">
                    {/* Zoom Overlay */}
                    {isImgZoomed && selectedLesson?.diagramUrl && (
                        <div className="fixed inset-0 z-[100] bg-black/90 flex items-center justify-center p-4 cursor-zoom-out" onClick={() => setIsImgZoomed(false)}>
                            <img src={selectedLesson.diagramUrl} className="max-w-full max-h-full rounded-lg" />
                        </div>
                    )}

                    {/* Navigation */}
                    <nav className="bg-white border-b sticky top-0 z-50 px-6 py-4 flex justify-between items-center">
                        <div className="flex items-center gap-2 font-black text-2xl text-blue-600 cursor-pointer" onClick={() => setView('dashboard')}>
                            <Icon name="Cpu" size={32} />
                            <span className="tracking-tight uppercase">Pi Python<span className="text-slate-300">Club</span></span>
                        </div>
                        <div className="hidden md:flex items-center gap-8 text-sm font-bold text-slate-500">
                            <button onClick={() => setView('dashboard')} className={view === 'dashboard' ? 'text-blue-600' : ''}>Lessons</button>
                            <button onClick={() => setView('projects')} className={view === 'projects' ? 'text-blue-600' : ''}>Projects</button>
                        </div>
                    </nav>

                    <main className="max-w-6xl mx-auto p-4 md:p-10">
                        {view === 'dashboard' && (
                            <div className="space-y-12">
                                <div className="bg-gradient-to-br from-indigo-600 to-blue-700 rounded-[2rem] p-8 md:p-12 text-white relative overflow-hidden shadow-xl">
                                    <div className="relative z-10 max-w-lg">
                                        <h1 className="text-4xl md:text-5xl font-black mb-4 uppercase">The Lab.</h1>
                                        <p className="text-blue-100 text-lg mb-0">Welcome to the club resources. Browse our modules and start building.</p>
                                    </div>
                                    <Icon name="Wifi" size={256} className="absolute top-[-20px] right-[-20px] text-white/5 -rotate-12" />
                                </div>

                                <section>
                                    <h2 className="text-2xl font-black mb-6 flex items-center gap-3 uppercase tracking-tight">Available Modules</h2>
                                    <div className="grid md:grid-cols-2 lg:grid-cols-3 gap-6">
                                        {LESSONS.map(lesson => (
                                            <div key={lesson.id} onClick={() => { setSelectedLesson(lesson); setView('lesson'); }} className="bg-white p-6 rounded-3xl border border-slate-200 hover:shadow-xl transition-all cursor-pointer group">
                                                <div className="flex justify-between items-start mb-4">
                                                    <div className="p-3 rounded-2xl bg-blue-50 text-blue-600"><Icon name="BookOpen" size={24} /></div>
                                                    <span className="text-[10px] font-bold text-slate-400 uppercase tracking-widest">{lesson.duration}</span>
                                                </div>
                                                <h3 className="text-lg font-black group-hover:text-blue-600 mb-2">{lesson.title}</h3>
                                                <p className="text-slate-500 text-sm line-clamp-2">{lesson.objective}</p>
                                            </div>
                                        ))}
                                    </div>
                                </section>
                            </div>
                        )}

                        {view === 'lesson' && selectedLesson && (
                            <div className="grid lg:grid-cols-5 gap-8">
                                <div className="lg:col-span-3 space-y-6">
                                    <button onClick={() => setView('dashboard')} className="text-sm font-black text-slate-400 hover:text-blue-600 uppercase tracking-tighter flex items-center gap-1">← Back</button>
                                    <div className="bg-white rounded-[2.5rem] border border-slate-200 overflow-hidden shadow-sm">
                                        <div className="bg-slate-900 p-8 text-white">
                                            <span className="text-blue-400 font-bold text-xs uppercase tracking-widest block mb-2">{selectedLesson.module}</span>
                                            <h1 className="text-3xl font-black">{selectedLesson.title}</h1>
                                        </div>
                                        <div className="p-8 space-y-8">
                                            <section>
                                                <h3 className="text-xl font-black mb-4">Objective</h3>
                                                <p className="text-slate-600 text-lg leading-relaxed">{selectedLesson.objective}</p>
                                            </section>

                                            <section>
                                                <h3 className="text-xl font-black mb-4 flex items-center gap-2 text-blue-600"><Icon name="Zap" size={20} /> Wiring Diagram</h3>
                                                {selectedLesson.diagramUrl && (
                                                    <div className="mb-6 group relative cursor-zoom-in rounded-3xl overflow-hidden border-4 border-slate-100" onClick={() => setIsImgZoomed(true)}>
                                                        <img src={selectedLesson.diagramUrl} className="w-full h-auto" />
                                                        <div className="absolute inset-0 bg-black/40 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center">
                                                            <span className="bg-white px-4 py-2 rounded-full text-xs font-bold uppercase">Click to Zoom</span>
                                                        </div>
                                                    </div>
                                                )}
                                                <div className="bg-slate-50 rounded-2xl p-6">
                                                    <pre className="whitespace-pre-wrap font-sans text-slate-700 text-sm leading-relaxed">{selectedLesson.wiring}</pre>
                                                </div>
                                            </section>

                                            <section className="bg-slate-50 p-6 rounded-2xl">
                                                <h3 className="font-black mb-2 flex items-center gap-2 text-slate-800 uppercase text-sm"><Icon name="Layout" size={16} /> Concepts</h3>
                                                <p className="text-slate-600 text-sm">{selectedLesson.content}</p>
                                            </section>
                                        </div>
                                    </div>
                                </div>

                                <div className="lg:col-span-2 space-y-6">
                                    <div className="sticky top-28 space-y-6">
                                        <div className="bg-slate-900 rounded-[2rem] p-6 shadow-2xl">
                                            <div className="flex justify-between items-center mb-4">
                                                <h3 className="text-white font-bold flex items-center gap-2 text-sm"><Icon name="Code" size={16} /> MicroPython</h3>
                                                <button onClick={() => handleCopy(selectedLesson.code)} className="text-[10px] text-white/50 hover:text-white bg-white/10 px-3 py-1 rounded-lg">COPY</button>
                                            </div>
                                            <pre className="text-blue-300 font-mono text-xs overflow-x-auto leading-relaxed">{selectedLesson.code}</pre>
                                        </div>

                                        <div className="bg-amber-50 border border-amber-200 p-6 rounded-2xl">
                                            <h4 className="text-amber-800 font-bold flex items-center gap-2 mb-2 text-sm uppercase"><Icon name="AlertCircle" size={18} /> Troubleshooting</h4>
                                            <p className="text-amber-900/70 text-sm leading-snug">{selectedLesson.troubleshooting}</p>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {view === 'projects' && (
                            <div className="space-y-8">
                                <h1 className="text-4xl font-black uppercase tracking-tighter">Project Gallery</h1>
                                <div className="grid md:grid-cols-2 gap-8">
                                    {PROJECTS.map(p => (
                                        <div key={p.id} className="bg-white rounded-[2rem] border border-slate-200 overflow-hidden">
                                            <div className="p-8">
                                                <div className="flex justify-between items-start mb-4">
                                                    <h3 className="text-2xl font-black">{p.title}</h3>
                                                    <span className="px-3 py-1 rounded-full text-[10px] font-black uppercase bg-slate-100 text-slate-500">{p.difficulty}</span>
                                                </div>
                                                <p className="text-slate-500 mb-6">{p.desc}</p>
                                                <div className="flex flex-wrap gap-2">
                                                    {p.parts.map(part => <span key={part} className="bg-blue-50 px-3 py-1 rounded-lg text-[10px] font-bold text-blue-600 border border-blue-100">{part}</span>)}
                                                </div>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}
                    </main>

                    {/* Mobile Navigation */}
                    <div className="md:hidden fixed bottom-0 left-0 right-0 bg-white border-t px-6 py-4 flex justify-around items-center z-50">
                        <button onClick={() => setView('dashboard')} className={view === 'dashboard' ? 'text-blue-600' : 'text-slate-300'}><Icon name="Home" /></button>
                        <button onClick={() => setView('projects')} className={view === 'projects' ? 'text-blue-600' : 'text-slate-300'}><Icon name="Rocket" /></button>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
